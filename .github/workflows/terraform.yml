name: Terraform

on:
  pull_request:
    branches: [main]
    paths: ["terraform/**", ".github/workflows/terraform.yml"]
  push:
    branches: [main]
    paths: ["terraform/**", ".github/workflows/terraform.yml"]

permissions:
  id-token: write   # for OIDC federation with Azure
  contents: read
  pull-requests: write  # to post plan comment

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: terraform
    env:
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
      TF_VAR_image:                       ghcr.io/${{ github.repository_owner }}/temple-cms:latest
      TF_VAR_ghcr_username:               ${{ secrets.GHCR_USERNAME }}
      TF_VAR_ghcr_token:                  ${{ secrets.GHCR_TOKEN }}
      TF_VAR_strapi_app_keys:             ${{ secrets.STRAPI_APP_KEYS }}
      TF_VAR_strapi_api_token_salt:       ${{ secrets.STRAPI_API_TOKEN_SALT }}
      TF_VAR_strapi_admin_jwt_secret:     ${{ secrets.STRAPI_ADMIN_JWT_SECRET }}
      TF_VAR_strapi_transfer_token_salt:  ${{ secrets.STRAPI_TRANSFER_TOKEN_SALT }}
      TF_VAR_strapi_jwt_secret:           ${{ secrets.STRAPI_JWT_SECRET }}
      TF_VAR_strapi_encryption_key:       ${{ secrets.STRAPI_ENCRYPTION_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_SA }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
