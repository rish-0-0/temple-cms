name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write       # GHCR push
  id-token: write       # Azure OIDC
  pull-requests: write  # Terraform plan comment

jobs:
  # -------------------------------------------------------------------
  # Detect which kinds of files changed, so we can skip jobs that aren't
  # affected by the change. PR builds also run via this so the plan job
  # only fires on terraform-touching PRs.
  # -------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.changes.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/cicd.yml'

  # -------------------------------------------------------------------
  # Always build. On PR, build-only. On push to main, also push to GHCR.
  # -------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/temple-cms
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'push' }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------
  # Terraform plan — runs on PRs that touch terraform/**.
  # Posts the plan as a PR comment.
  # -------------------------------------------------------------------
  terraform-plan:
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.terraform == 'true'
    needs: detect-changes
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: terraform
    env:
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
      TF_VAR_image:                       ghcr.io/${{ github.repository_owner }}/temple-cms:latest
      TF_VAR_ghcr_username:               ${{ secrets.GHCR_USERNAME }}
      TF_VAR_ghcr_token:                  ${{ secrets.GHCR_TOKEN }}
      TF_VAR_strapi_app_keys:             ${{ secrets.STRAPI_APP_KEYS }}
      TF_VAR_strapi_api_token_salt:       ${{ secrets.STRAPI_API_TOKEN_SALT }}
      TF_VAR_strapi_admin_jwt_secret:     ${{ secrets.STRAPI_ADMIN_JWT_SECRET }}
      TF_VAR_strapi_transfer_token_salt:  ${{ secrets.STRAPI_TRANSFER_TOKEN_SALT }}
      TF_VAR_strapi_jwt_secret:           ${{ secrets.STRAPI_JWT_SECRET }}
      TF_VAR_strapi_encryption_key:       ${{ secrets.STRAPI_ENCRYPTION_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_SA }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # -------------------------------------------------------------------
  # Terraform apply — runs on push to main when terraform/** changed.
  # Needs build to have completed so the image is in GHCR before App
  # Service tries to pull it.
  # -------------------------------------------------------------------
  terraform-apply:
    if: github.event_name == 'push' && needs.detect-changes.outputs.terraform == 'true'
    needs: [detect-changes, build]
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: terraform
    env:
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
      TF_VAR_image:                       ghcr.io/${{ github.repository_owner }}/temple-cms:latest
      TF_VAR_ghcr_username:               ${{ secrets.GHCR_USERNAME }}
      TF_VAR_ghcr_token:                  ${{ secrets.GHCR_TOKEN }}
      TF_VAR_strapi_app_keys:             ${{ secrets.STRAPI_APP_KEYS }}
      TF_VAR_strapi_api_token_salt:       ${{ secrets.STRAPI_API_TOKEN_SALT }}
      TF_VAR_strapi_admin_jwt_secret:     ${{ secrets.STRAPI_ADMIN_JWT_SECRET }}
      TF_VAR_strapi_transfer_token_salt:  ${{ secrets.STRAPI_TRANSFER_TOKEN_SALT }}
      TF_VAR_strapi_jwt_secret:           ${{ secrets.STRAPI_JWT_SECRET }}
      TF_VAR_strapi_encryption_key:       ${{ secrets.STRAPI_ENCRYPTION_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_SA }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform apply
        run: terraform apply -auto-approve

  # -------------------------------------------------------------------
  # Restart App Service so it repulls :latest. Runs after build, and
  # waits for terraform-apply if that one ran. Skipped on PRs and on
  # the very first deploy (when the web app doesn't yet exist).
  # -------------------------------------------------------------------
  restart-app:
    if: |
      github.event_name == 'push' &&
      always() &&
      needs.build.result == 'success' &&
      (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
    needs: [build, terraform-apply]
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Restart App Service to pull the new :latest image
        run: |
          az webapp restart \
            --resource-group rg-divyakatha \
            --name app-divyakatha-cms || \
            echo "App Service not found yet (likely first deploy) — skipping restart."
